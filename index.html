        <section class="sidebar-section">

            <div class="mini-icon"></div>
            <div class="mini-icon"></div>

        </section>

        <section class="sidebar-section">
          <div class="section-title">Tools</div>
          <!-- Toolbox area for placing utilities or tactical markers. -->
          <div class="tools-grid">
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>

        </section>
      </aside>

      <!-- Center workspace: top bar actions and map canvas. -->
      <main class="center-map">
        <div class="map-topbar">

            <button class="icon-btn">⚙</button>

          <button class="icon-btn danger">🗑</button>
        </div>

          { name: "Viper's Pit", type: "util-sphere" },
        ],
        vyse: [
          { name: "Arc Flash", type: "util-flash" },
          { name: "Steel Snare", type: "util-trap" },
          { name: "Obscura", type: "util-sphere" },
          { name: "Overload", type: "util-stun" },
        ],
        waylay: [
          { name: "Mirror Smoke", type: "util-sphere" },
          { name: "Slipstream", type: "util-line" },
          { name: "Lumen Flash", type: "util-flash" },
          { name: "Lockdown Field", type: "util-stun" },
        ],
        yoru: [
          { name: "Blindside", type: "util-flash" },
          { name: "Gatecrash", type: "util-line" },
          { name: "Fakeout", type: "util-recon" },
          { name: "Dimensional Drift", type: "util-stun" },
        ],

      // Keep token movement inside the map canvas bounds.
      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function applyMapTransform() {
        mapWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      }

      function screenToMap(clientX, clientY) {
        const canvasRect = mapCanvas.getBoundingClientRect();
        const x = (clientX - canvasRect.left - panX) / zoom;
        const y = (clientY - canvasRect.top - panY) / zoom;
        return { x, y };
      }

      function getMapSize() {
        return {
          width: mapWrapper.offsetWidth,
          height: mapWrapper.offsetHeight,
        };
      }

      function getElementSizeInMap(el) {
        const rect = el.getBoundingClientRect();
        return { width: rect.width / zoom, height: rect.height / zoom };
      }

      // Create a draggable token in the center of the map from a roster icon.
      function createTokenFromIcon(icon) {
        const token = document.createElement("div");
        token.className = "map-agent-token";
        token.dataset.anchor = "topleft";
        token.dataset.side = currentSide;
        token.dataset.weapon = "3";
        token.style.backgroundImage = `url("${icon.src}")`;
        token.setAttribute("aria-label", icon.alt || "Agent");

        const badge = document.createElement("span");
        badge.className = "weapon-badge";
        badge.dataset.weapon = "3";
        const badgeIcon = document.createElement("span");
        badgeIcon.className = "weapon-icon";
        badge.appendChild(badgeIcon);
        token.appendChild(badge);

        const rect = mapCanvas.getBoundingClientRect();
        const center = screenToMap(
          rect.left + rect.width / 2,
          rect.top + rect.height / 2
        );
        const size = 40;
        const left = center.x - size / 2;
        const top = center.y - size / 2;

        token.style.left = `${left}px`;
        token.style.top = `${top}px`;

        // Start dragging and capture the pointer offset within the token.
        token.addEventListener("mousedown", (event) => {
          if (spacePressed || event.button === 1) return;
          activeToken = token;
          const cursor = screenToMap(event.clientX, event.clientY);
          dragOffsetX = cursor.x - parseFloat(token.style.left);
          dragOffsetY = cursor.y - parseFloat(token.style.top);
          token.style.cursor = "grabbing";
        });

        token.addEventListener("contextmenu", (event) => {
          event.preventDefault();
          showWeaponPopover(token, event.clientX, event.clientY);
        });

        token.addEventListener("dblclick", (event) => {
          showWeaponPopover(token, event.clientX, event.clientY);
        });

        mapWrapper.appendChild(token);
      }

      // Create a utility element on the map, centered in the viewport.
      function createUtilityOnMap(utilityType, event) {
        const util = document.createElement("div");
        util.className = `map-utility ${utilityType}`;
        util.dataset.utilityType = utilityType;
        util.dataset.anchor = "center";
        util.dataset.side = currentSide;

        util.addEventListener("mousedown", (mouseEvent) => {
          if (spacePressed || mouseEvent.button === 1) return;
          activeToken = util;
          const cursor = screenToMap(mouseEvent.clientX, mouseEvent.clientY);
          dragOffsetX = cursor.x - parseFloat(util.style.left);
          dragOffsetY = cursor.y - parseFloat(util.style.top);
          util.style.cursor = "grabbing";
        });

        mapWrapper.appendChild(util);

        // Position the element at the center of the map canvas.
        const canvasRect = mapCanvas.getBoundingClientRect();
        const mapCenter = screenToMap(
          canvasRect.left + canvasRect.width / 2,
          canvasRect.top + canvasRect.height / 2
        );
        const utilSize = getElementSizeInMap(util);
        const halfW = utilSize.width / 2;
        const halfH = utilSize.height / 2;
        const mapSize = getMapSize();
        const clampedCenterX = clamp(mapCenter.x, halfW, mapSize.width - halfW);
        const clampedCenterY = clamp(mapCenter.y, halfH, mapSize.height - halfH);
        util.style.left = `${clampedCenterX}px`;
        util.style.top = `${clampedCenterY}px`;
      }

      function renderUtilityPopover(agentId) {
        const utilities = agentUtilities[agentId] || [];
        utilityPopover.innerHTML = "";
        utilities.forEach((util) => {
          const button = document.createElement("button");
          button.className = "utility-item";
          button.dataset.utilityType = util.type;
          button.title = util.name;
          button.textContent = util.name
            .split(" ")
            .map((word) => word[0])
            .join("")
            .slice(0, 2)
            .toUpperCase();

          button.addEventListener("mousedown", (event) => {
            event.preventDefault();
            createUtilityOnMap(util.type, event);
          });

          utilityPopover.appendChild(button);
        });
      }

      function showUtilityPopover(icon) {
        const agentId = icon.dataset.agentId;
        if (!agentId) return;
        activeAgentId = agentId;
        renderUtilityPopover(agentId);
        utilityPopover.classList.add("active");
        utilityPopover.setAttribute("aria-hidden", "false");

        const iconRect = icon.getBoundingClientRect();
        const popoverRect = utilityPopover.getBoundingClientRect();
        const rawLeft = iconRect.left + iconRect.width / 2 - popoverRect.width / 2;
        const rawTop = iconRect.top - popoverRect.height;
        const safeLeft = clamp(
          rawLeft,
          8,
          window.innerWidth - popoverRect.width - 8
        );
        const safeTop = clamp(rawTop, 8, window.innerHeight - popoverRect.height - 8);
        utilityPopover.style.left = `${safeLeft}px`;
        utilityPopover.style.top = `${safeTop}px`;
      }

      function schedulePopoverHide() {
        if (popoverHideTimer) clearTimeout(popoverHideTimer);
        popoverHideTimer = setTimeout(() => {
          utilityPopover.classList.remove("active");
          utilityPopover.setAttribute("aria-hidden", "true");
          activeAgentId = null;
        }, 120);
      }

      function cancelPopoverHide() {
        if (popoverHideTimer) {
          clearTimeout(popoverHideTimer);
          popoverHideTimer = null;
        }
      }

      function getAgentIdFromIcon(icon) {
        const src = icon.getAttribute("src") || "";
        const fileName = src.split("/").pop() || "";
        return fileName.toLowerCase().replace(".png", "");
      }

      function isMovingToPopover(event) {
        return utilityPopover.contains(event.relatedTarget);
      }

      function isMovingToAgent(event) {
        return event.relatedTarget && event.relatedTarget.classList?.contains("agent-icon");
      }

      // Spawn a token when a roster icon is clicked.
      agentIcons.forEach((icon) => {
        icon.dataset.agentId = getAgentIdFromIcon(icon);

        icon.addEventListener("click", () => {
          createTokenFromIcon(icon);
        });

        icon.addEventListener("mouseenter", () => {
          cancelPopoverHide();
          showUtilityPopover(icon);
        });

        icon.addEventListener("mouseleave", (event) => {
          if (isMovingToPopover(event)) return;
          schedulePopoverHide();
        });
      });

      utilityPopover.addEventListener("mouseenter", cancelPopoverHide);
      utilityPopover.addEventListener("mouseleave", (event) => {
        if (isMovingToAgent(event)) return;
        schedulePopoverHide();
      });

      function showWeaponPopover(token, clientX, clientY) {
        activeWeaponToken = token;
        weaponPopover.classList.add("active");
        weaponPopover.setAttribute("aria-hidden", "false");
        const popRect = weaponPopover.getBoundingClientRect();
        const left = clamp(clientX + 8, 8, window.innerWidth - popRect.width - 8);
        const top = clamp(clientY - popRect.height / 2, 8, window.innerHeight - popRect.height - 8);
        weaponPopover.style.left = `${left}px`;
        weaponPopover.style.top = `${top}px`;
      }

      function hideWeaponPopover() {
        weaponPopover.classList.remove("active");
        weaponPopover.setAttribute("aria-hidden", "true");
        activeWeaponToken = null;
      }

      weaponOptions.forEach((btn) => {
        btn.addEventListener("click", () => {
          if (!activeWeaponToken) return;
          const weapon = btn.dataset.weapon;
          activeWeaponToken.dataset.weapon = weapon;
          const badge = activeWeaponToken.querySelector(".weapon-badge");
          if (badge) badge.dataset.weapon = weapon;
          hideWeaponPopover();
        });
      });

      document.addEventListener("click", (event) => {
        if (!weaponPopover.classList.contains("active")) return;
        if (weaponPopover.contains(event.target)) return;
        if (activeWeaponToken && activeWeaponToken.contains(event.target)) return;
        hideWeaponPopover();
      });

      // Side toggle (attack/defend) updates global state and UI theme.
      function setSide(side) {
        currentSide = side;
        document.body.dataset.side = side;
        sideToggles.forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.side === side);
        });
      }

      sideToggles.forEach((btn) => {
        const label = btn.textContent.trim().toLowerCase();
        btn.dataset.side = label === "attack" ? "attack" : "defense";
        btn.addEventListener("click", () => {
          setSide(btn.dataset.side);
        });
      });

      setSide(currentSide);
      applyMapTransform();

      function buildSimulationPayload() {
        const players = Array.from(mapWrapper.querySelectorAll(".map-agent-token")).map(
          (token) => ({
            id: token.getAttribute("aria-label") || "agent",
            x: parseFloat(token.style.left),
            y: parseFloat(token.style.top),
            side: token.dataset.side || "attack",
            weapon_category: parseInt(token.dataset.weapon || "3", 10),
          })
        );

        const utilities = Array.from(mapWrapper.querySelectorAll(".map-utility")).map(
          (util, idx) => ({
            id: `util_${idx}`,
            type: util.dataset.utilityType || "util-sphere",
            x: parseFloat(util.style.left),
            y: parseFloat(util.style.top),
            radius: 0,
            side: util.dataset.side || "attack",
          })
        );

        return {
          map: "Bind",
          created_at: new Date().toISOString(),
          players,
          utilities,
        };
      }

      // Pan controls: space + drag or middle mouse.
      document.addEventListener("keydown", (event) => {
        if (event.code === "Space") {
          spacePressed = true;
          mapCanvas.style.cursor = "grab";
        }
      });

      document.addEventListener("keyup", (event) => {
        if (event.code === "Space") {
          spacePressed = false;
          mapCanvas.style.cursor = "";
        }
      });

      mapCanvas.addEventListener("mousedown", (event) => {
        const isMiddle = event.button === 1;
        const isSpaceDrag = event.button === 0 && spacePressed;
        if (!isMiddle && !isSpaceDrag) return;
        event.preventDefault();
        isPanning = true;
        panStartX = event.clientX;
        panStartY = event.clientY;
        panOriginX = panX;
        panOriginY = panY;
        mapCanvas.style.cursor = "grabbing";
      });

      document.addEventListener("mouseup", () => {
        if (isPanning) {
          isPanning = false;
          mapCanvas.style.cursor = spacePressed ? "grab" : "";
        }
      });

      document.addEventListener("mousemove", (event) => {
        if (!isPanning) return;
        const dx = event.clientX - panStartX;
        const dy = event.clientY - panStartY;
        panX = panOriginX + dx;
        panY = panOriginY + dy;
        applyMapTransform();
      });

      mapCanvas.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();
          const zoomDelta = event.deltaY > 0 ? -0.1 : 0.1;
          const newZoom = clamp(zoom + zoomDelta, 0.5, 3.0);
          if (newZoom === zoom) return;

          const canvasRect = mapCanvas.getBoundingClientRect();
          const mouseX = event.clientX - canvasRect.left;
          const mouseY = event.clientY - canvasRect.top;
          const mapX = (mouseX - panX) / zoom;
          const mapY = (mouseY - panY) / zoom;

          zoom = newZoom;
          panX = mouseX - mapX * zoom;
          panY = mouseY - mapY * zoom;
          applyMapTransform();
        },
        { passive: false }
      );

      // Track dragging, update token position, and highlight trash target.
      document.addEventListener("mousemove", (event) => {
        if (!activeToken || isPanning) return;
        const cursor = screenToMap(event.clientX, event.clientY);
        const mapSize = getMapSize();
        const tokenSize = getElementSizeInMap(activeToken);
        const anchor = activeToken.dataset.anchor || "topleft";

        if (anchor === "center") {
          const halfW = tokenSize.width / 2;
          const halfH = tokenSize.height / 2;
          const centerX = cursor.x - dragOffsetX;
          const centerY = cursor.y - dragOffsetY;
          const clampedCenterX = clamp(centerX, halfW, mapSize.width - halfW);
          const clampedCenterY = clamp(centerY, halfH, mapSize.height - halfH);
          activeToken.style.left = `${clampedCenterX}px`;
          activeToken.style.top = `${clampedCenterY}px`;
        } else {
          const x = cursor.x - dragOffsetX;
          const y = cursor.y - dragOffsetY;
          const clampedX = clamp(x, 0, mapSize.width - tokenSize.width);
          const clampedY = clamp(y, 0, mapSize.height - tokenSize.height);
          activeToken.style.left = `${clampedX}px`;
          activeToken.style.top = `${clampedY}px`;
        }

        const trashRect = mapTrash.getBoundingClientRect();
        const isOverTrash =
          event.clientX >= trashRect.left &&
          event.clientX <= trashRect.right &&
          event.clientY >= trashRect.top &&
          event.clientY <= trashRect.bottom;
        mapTrash.classList.toggle("active", isOverTrash);
      });

      // Drop tokens; remove if released over the trash button.
      document.addEventListener("mouseup", () => {
        if (!activeToken) return;
        const trashRect = mapTrash.getBoundingClientRect();
        const tokenRect = activeToken.getBoundingClientRect();
        const overlaps =
          tokenRect.left < trashRect.right &&
          tokenRect.right > trashRect.left &&
          tokenRect.top < trashRect.bottom &&
          tokenRect.bottom > trashRect.top;

        if (overlaps) {
          activeToken.remove();
        } else {
          activeToken.style.cursor = "grab";
        }
        mapTrash.classList.remove("active");
        activeToken = null;
      });
    </script>
  </body>
</html>
