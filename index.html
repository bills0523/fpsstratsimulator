<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FPS Strat Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app-container">
      <aside class="left-sidebar">
        <section class="sidebar-section">
          <div class="section-title">Map Selection</div>
          <div class="map-card">
            <div class="map-preview">BIND</div>
            <div class="map-toggle">
              <button class="toggle active">Attack</button>
              <button class="toggle">Defend</button>
            </div>
          </div>
        </section>

        <section class="sidebar-section">
          <div class="section-title">Sequence</div>
          <button class="secondary wide">SEQ. Tutorial</button>
          <div class="sequence-grid">
            <button class="seq">1</button>
            <button class="seq">2</button>
            <button class="seq">3</button>
            <button class="seq">4</button>
            <button class="seq">5</button>
            <button class="seq">6</button>
            <button class="seq">7</button>
            <button class="seq">8</button>
            <button class="seq">9</button>
            <button class="seq">10</button>
          </div>
          <button class="secondary wide">Audio</button>
        </section>

        <section class="sidebar-section">
          <div class="section-title">Delete</div>
          <button class="danger wide">Everything</button>
          <button class="secondary wide">Sequence Step 1</button>
          <div class="mini-icons">
            <div class="mini-icon"></div>
            <div class="mini-icon"></div>
            <div class="mini-icon"></div>
            <div class="mini-icon"></div>
          </div>
        </section>

        <section class="sidebar-section">
          <div class="section-title">Tools</div>
          <div class="tools-grid">
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
            <button class="tool"></button>
          </div>
        </section>
      </aside>

      <main class="center-map">
        <div class="map-topbar">
          <div class="topbar-left">
            <button class="icon-btn">⚙</button>
            <button class="icon-btn">💾</button>
            <button class="icon-btn">📸</button>
            <button class="icon-btn">🎥</button>
            <button class="icon-btn">➕</button>
          </div>
          <button class="icon-btn danger">🗑</button>
        </div>
        <div class="map-wrapper" id="map-canvas">
          <img class="map-image" src="assets/maps/Map Bind.png" alt="Bind map" />
        </div>
      </main>

      <aside class="right-sidebar">
        <div class="right-header">Home</div>
        <button class="primary wide">Add Strategy</button>
      </aside>

      <section class="bottom-bar">
        <div class="bottom-left">
          <div class="filter-row">
            <button class="filter active">All</button>
            <button class="filter">On Map</button>
            <button class="filter">Ally</button>
          </div>
          <div class="filter-row">
            <button class="filter">Favored</button>
            <div class="mini-icons">
              <div class="mini-icon"></div>
              <div class="mini-icon"></div>
              <div class="mini-icon"></div>
            </div>
          </div>
        </div>
        <div class="bottom-right">
          <img src="assets/agents/astra.png" alt="Astra" class="agent-icon" />
          <img src="assets/agents/breach.png" alt="Breach" class="agent-icon" />
          <img src="assets/agents/brimstone.png" alt="Brimstone" class="agent-icon" />
          <img src="assets/agents/chamber.png" alt="Chamber" class="agent-icon" />
          <img src="assets/agents/clove.png" alt="Clove" class="agent-icon" />
          <img src="assets/agents/cypher.png" alt="Cypher" class="agent-icon" />
          <img src="assets/agents/deadlock.png" alt="Deadlock" class="agent-icon" />
          <img src="assets/agents/fade.png" alt="Fade" class="agent-icon" />
          <img src="assets/agents/gekko.png" alt="Gekko" class="agent-icon" />
          <img src="assets/agents/harbor.png" alt="Harbor" class="agent-icon" />
          <img src="assets/agents/iso.png" alt="Iso" class="agent-icon" />
          <img src="assets/agents/jett.png" alt="Jett" class="agent-icon" />
          <img src="assets/agents/kj.png" alt="Killjoy" class="agent-icon" />
          <img src="assets/agents/ko.png" alt="KAY/O" class="agent-icon" />
          <img src="assets/agents/mito.png" alt="Mito" class="agent-icon" />
          <img src="assets/agents/neon.png" alt="Neon" class="agent-icon" />
          <img src="assets/agents/omen.png" alt="Omen" class="agent-icon" />
          <img src="assets/agents/pheonix.png" alt="Phoenix" class="agent-icon" />
          <img src="assets/agents/raze.png" alt="Raze" class="agent-icon" />
          <img src="assets/agents/reyna.png" alt="Reyna" class="agent-icon" />
          <img src="assets/agents/sage.png" alt="Sage" class="agent-icon" />
          <img src="assets/agents/skye.png" alt="Skye" class="agent-icon" />
          <img src="assets/agents/sove.png" alt="Sova" class="agent-icon" />
          <img src="assets/agents/tejo.png" alt="Tejo" class="agent-icon" />
          <img src="assets/agents/veto.png" alt="Veto" class="agent-icon" />
          <img src="assets/agents/viper.png" alt="Viper" class="agent-icon" />
          <img src="assets/agents/vyse.png" alt="Vyse" class="agent-icon" />
          <img src="assets/agents/waylay.png" alt="Waylay" class="agent-icon" />
          <img src="assets/agents/yoru.png" alt="Yoru" class="agent-icon" />
        </div>
      </section>
    </div>
    <script>
      const mapCanvas = document.getElementById("map-canvas");
      const agentIcons = document.querySelectorAll(".agent-icon");

      let activeToken = null;
      let dragOffsetX = 0;
      let dragOffsetY = 0;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function createTokenFromIcon(icon) {
        const token = document.createElement("img");
        token.className = "map-agent-token";
        token.src = icon.src;
        token.alt = icon.alt || "Agent";
        token.draggable = false;

        const rect = mapCanvas.getBoundingClientRect();
        const size = 40;
        const left = (rect.width - size) / 2;
        const top = (rect.height - size) / 2;

        token.style.left = `${left}px`;
        token.style.top = `${top}px`;

        token.addEventListener("mousedown", (event) => {
          activeToken = token;
          const tokenRect = token.getBoundingClientRect();
          dragOffsetX = event.clientX - tokenRect.left;
          dragOffsetY = event.clientY - tokenRect.top;
          token.style.cursor = "grabbing";
        });

        mapCanvas.appendChild(token);
      }

      agentIcons.forEach((icon) => {
        icon.addEventListener("click", () => {
          createTokenFromIcon(icon);
        });
      });

      document.addEventListener("mousemove", (event) => {
        if (!activeToken) return;
        const canvasRect = mapCanvas.getBoundingClientRect();
        const tokenRect = activeToken.getBoundingClientRect();
        const size = tokenRect.width;

        const x = event.clientX - canvasRect.left - dragOffsetX;
        const y = event.clientY - canvasRect.top - dragOffsetY;

        const clampedX = clamp(x, 0, canvasRect.width - size);
        const clampedY = clamp(y, 0, canvasRect.height - size);

        activeToken.style.left = `${clampedX}px`;
        activeToken.style.top = `${clampedY}px`;
      });

      document.addEventListener("mouseup", () => {
        if (!activeToken) return;
        activeToken.style.cursor = "grab";
        activeToken = null;
      });
    </script>
  </body>
</html>
