<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FPS Strat Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar left">
        <section class="panel map-select">
          <div class="panel-title">Map Selection</div>
          <div class="map-preview placeholder-asset">
            <span>X</span>
          </div>
          <div class="map-info">
            <div class="map-name">BIND</div>
            <div class="map-toggle">
              <button class="toggle active">Attack</button>
              <button class="toggle">Defend</button>
            </div>
          </div>
        </section>
      </aside>

      <main class="center">
        <!-- Map image should appear in the right-center of the UI. -->
        <div class="map-canvas">
          <img
            class="map-image placeholder-asset"
            src="assets/maps/Map Bind.png"
            alt="Bind map"
          />
        </div>

        <section class="panel tools">
          <div class="panel-title">Tools</div>
          <div class="tools-grid">
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
          </div>
        </section>

        <!-- Agent portraits should sit in the center-bottom of the UI. -->
        <section class="agent-bar">
          <div class="agent-filters">
            <button class="filter active">All</button>
            <button class="filter">On Map</button>
            <button class="filter">Ally</button>
          </div>
          <div class="agent-scroller">
            <img class="agent-card placeholder-asset" src="assets/agents/astra.png" alt="Astra" />
            <img class="agent-card placeholder-asset" src="assets/agents/breach.png" alt="Breach" />
            <img class="agent-card placeholder-asset" src="assets/agents/brimstone.png" alt="Brimstone" />
            <img class="agent-card placeholder-asset" src="assets/agents/chamber.png" alt="Chamber" />
            <img class="agent-card placeholder-asset" src="assets/agents/clove.png" alt="Clove" />
            <img class="agent-card placeholder-asset" src="assets/agents/cypher.png" alt="Cypher" />
            <img class="agent-card placeholder-asset" src="assets/agents/deadlock.png" alt="Deadlock" />
            <img class="agent-card placeholder-asset" src="assets/agents/fade.png" alt="Fade" />
            <img class="agent-card placeholder-asset" src="assets/agents/gekko.png" alt="Gekko" />
            <img class="agent-card placeholder-asset" src="assets/agents/harbor.png" alt="Harbor" />
            <img class="agent-card placeholder-asset" src="assets/agents/iso.png" alt="Iso" />
            <img class="agent-card placeholder-asset" src="assets/agents/jett.png" alt="Jett" />
            <img class="agent-card placeholder-asset" src="assets/agents/kj.png" alt="Killjoy" />
            <img class="agent-card placeholder-asset" src="assets/agents/ko.png" alt="KAY/O" />
            <img class="agent-card placeholder-asset" src="assets/agents/mito.png" alt="Mito" />
            <img class="agent-card placeholder-asset" src="assets/agents/neon.png" alt="Neon" />
            <img class="agent-card placeholder-asset" src="assets/agents/omen.png" alt="Omen" />
            <img class="agent-card placeholder-asset" src="assets/agents/pheonix.png" alt="Phoenix" />
            <img class="agent-card placeholder-asset" src="assets/agents/raze.png" alt="Raze" />
            <img class="agent-card placeholder-asset" src="assets/agents/reyna.png" alt="Reyna" />
            <img class="agent-card placeholder-asset" src="assets/agents/sage.png" alt="Sage" />
            <img class="agent-card placeholder-asset" src="assets/agents/skye.png" alt="Skye" />
            <img class="agent-card placeholder-asset" src="assets/agents/sove.png" alt="Sova" />
            <img class="agent-card placeholder-asset" src="assets/agents/tejo.png" alt="Tejo" />
            <img class="agent-card placeholder-asset" src="assets/agents/veto.png" alt="Veto" />
            <img class="agent-card placeholder-asset" src="assets/agents/viper.png" alt="Viper" />
            <img class="agent-card placeholder-asset" src="assets/agents/vyse.png" alt="Vyse" />
            <img class="agent-card placeholder-asset" src="assets/agents/waylay.png" alt="Waylay" />
            <img class="agent-card placeholder-asset" src="assets/agents/yoru.png" alt="Yoru" />
          </div>
        </section>
      </main>

      <aside class="sidebar right">
        <section class="panel strategies">
          <div class="panel-title">Strategies</div>
          <button class="primary">Add Strategy</button>
          <div class="strategy-list">
            <div class="strategy-item">Default Setup</div>
            <div class="strategy-item">A Split</div>
            <div class="strategy-item">B Execute</div>
          </div>
        </section>
      </aside>
    </div>
  </body>
</html>
