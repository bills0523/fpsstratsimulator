<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FPS Strat Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar left">
        <section class="panel map-select">
          <div class="panel-title">Map Selection</div>
          <div class="map-preview placeholder-asset">
            <span>X</span>
          </div>
          <div class="map-info">
            <div class="map-name">BIND</div>
            <div class="map-toggle">
              <button class="toggle active">Attack</button>
              <button class="toggle">Defend</button>
            </div>
          </div>
        </section>
      </aside>

      <main class="center">
        <section class="top-bar">
          <div class="agent-filters">
            <button class="filter active">All</button>
            <button class="filter">On Map</button>
            <button class="filter">Ally</button>
          </div>
          <div class="agent-scroller">
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
            <div class="agent-card placeholder-asset"><span>X</span></div>
          </div>
        </section>

        <div class="map-canvas placeholder-asset">
          <span>X</span>
        </div>

        <section class="panel tools">
          <div class="panel-title">Tools</div>
          <div class="tools-grid">
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
            <button class="tool-btn placeholder-asset"><span>X</span></button>
          </div>
        </section>
      </main>

      <aside class="sidebar right">
        <section class="panel strategies">
          <div class="panel-title">Strategies</div>
          <button class="primary">Add Strategy</button>
          <div class="strategy-list">
            <div class="strategy-item">Default Setup</div>
            <div class="strategy-item">A Split</div>
            <div class="strategy-item">B Execute</div>
          </div>
        </section>
      </aside>
    </div>
  </body>
</html>
